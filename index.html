<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <title>Para sa'yo ❤️</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(to bottom, #ffdde1, #ee9ca7);
            text-align: center;
            padding: 40px;
            color: #4a1c1c;
        }
        .card {
            background: white;
            max-width: 500px;
            margin: auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        img {
            width: 100%;
            border-radius: 15px;
        }
        h1 {
            margin-top: 20px;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
        }
        footer {
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="card">
    <img src="herphoto.jpeg" alt="My Beautiful Babe">
    <h1>Hi Babe ❤️</h1>
    <p>
        Hindi kita need i-impress araw-araw  
        pero gusto kong ipaalala sa’yo  
        na mahal na mahal kita.  
        <br><br>
        Ikaw ang dahilan ng ngiti ko,  
        ng lakas ko, at ng pangarap ko.
    </p>
    <p><b>Will you continue being my happiness? 💍✨</b></p>
    <footer>
        — From Bryan 💕
    </footer>
</div>

</body>
</html>
